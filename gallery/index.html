<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- FILTER BUTTONS -->

    <div class="filters">

        <button class="active">All</button>
        <button>Nature</button>
        <button>City</button>
        <button>Animals</button>

    </div>

    <!-- GALLERY -->

    <div class="gallery">

        <div class="image nature">
            <img src="https://picsum.photos/id/1015/600/400">
        </div>

        <div class="image city">
            <img src="https://picsum.photos/id/1011/600/400">
        </div>

        <div class="image animals">
            <img src="https://picsum.photos/id/1025/600/400">
        </div>

        <div class="image nature">
            <img src="https://picsum.photos/id/1039/600/400">
        </div>

        <div class="image city">
            <img src="https://picsum.photos/id/1043/600/400">
        </div>

        <div class="image animals">
            <img src="https://picsum.photos/id/1062/600/400">
        </div>

    </div>

    <!-- LIGHTBOX -->

    <div class="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-img">

        <button class="next">&#10095;</button>

    </div>

    <!-- JAVASCRIPT -->

    <script src="script.js"></script>

</body>
</html>
